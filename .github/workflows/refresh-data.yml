name: Refresh Financial Data

on:
  schedule:
    - cron: "0 13 * * 1-5"  # 9 AM ET (UTC-4), weekdays only
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: dcf-app/server/requirements.txt

      - name: Install dependencies
        run: pip install -r dcf-app/server/requirements.txt

      - name: Run data fetch
        run: python dcf-app/server/app/main.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dcf-app/server/data/companies-financials.json
          git diff --cached --quiet || git commit -m "chore: refresh financial data [skip ci]"
          git push
